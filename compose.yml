services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: vacancelog-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vacancelog
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=20200129
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vacancelog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: vacancelog-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: vacancelog-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=postgres
      - RABBITMQ_DEFAULT_PASS=20200129

volumes:
  pgdata:
  redisdata: